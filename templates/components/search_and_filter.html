<!-- Filters -->
<div class="bg-slate-900 border border-slate-700 rounded-xl p-6 mb-8">
  <div class="flex items-center justify-between mb-5">
    <h3 class="text-xl font-semibold text-white">Filter Expenses</h3>

    <a
      href="{{ url_for('expense_analysis') }}"
      class="text-sm text-emerald-400 hover:text-emerald-300 transition"
    >
      Reset Filters
    </a>
  </div>

  <form method="GET" class="space-y-5">
    <!-- Search Row -->
    <div class="grid lg:grid-cols-2 gap-5">
      <!-- Search Title -->
      <div>
        <label class="block text-sm text-slate-400 mb-2"> Search Title </label>

        <input
          type="text"
          name="title"
          value="{{ request.args.get('title','') }}"
          placeholder="Search by title..."
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-emerald-500 outline-none"
        />
      </div>

      <!-- Search Note -->
      <div>
        <label class="block text-sm text-slate-400 mb-2"> Search Note </label>

        <input
          type="text"
          name="note"
          value="{{ request.args.get('note','') }}"
          placeholder="Search by note..."
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-emerald-500 outline-none"
        />
      </div>
    </div>

    <!-- Category + Date -->
    <div class="grid lg:grid-cols-3 gap-5">
      <!-- Category -->
      <div>
        <label class="block text-sm text-slate-400 mb-2"> Category </label>

        <select
          name="category"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-emerald-500 outline-none"
        >
          <option value="">
            All Categories {% if request.args.get('category') == '' %} selected
            {% endif %}
          </option>
          <option value="Food">
            Food {% if request.args.get('category') == 'Food' %} Food {% endif
            %}
          </option>
          <option value="Travel">
            Travel {% if request.args.get('category') == 'Travel' %} Travel {%
            endif %}
          </option>
          <option value="Shopping">
            Shopping {% if request.args.get('category') == 'Shopping' %}
            Shopping {% endif %}
          </option>
          <option value="Bills">
            Bills {% if request.args.get('category') == 'Bills' %} Bills {%
            endif %}
          </option>
          <option value="Entertainment">
            Entertainment {% if request.args.get('category') == 'Entertainment'
            %} Entertainment {% endif %}
          </option>
          <option value="Health">
            Health {% if request.args.get('category') == 'Health' %} Health {%
            endif %}
          </option>
          <option value="Other">
            Other {% if request.args.get('category') == 'Other' %} Other {%
            endif %}
          </option>
        </select>
      </div>

      <!-- From -->
      <div>
        <label class="block text-sm text-slate-400 mb-2"> From Date </label>

        <input
          type="date"
          name="from"
          value="{{ request.args.get('from','') }}"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-emerald-500 outline-none"
        />
      </div>

      <!-- To -->
      <div>
        <label class="block text-sm text-slate-400 mb-2"> To Date </label>

        <input
          type="date"
          name="to"
          value="{{ request.args.get('to','') }}"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-emerald-500 outline-none"
        />
      </div>
    </div>

    <!-- Amount + Sort -->
    <div class="grid lg:grid-cols-4 gap-5">
      <!-- Min Amount -->
      <div>
        <label class="block text-sm text-slate-400 mb-2"> Min Amount </label>

        <input
          type="number"
          step="0.01"
          name="min_amount"
          value="{{ request.args.get('min_amount','') }}"
          placeholder="₹0"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-emerald-500 outline-none"
        />
      </div>

      <!-- Max Amount -->
      <div>
        <label class="block text-sm text-slate-400 mb-2"> Max Amount </label>

        <input
          type="number"
          step="0.01"
          name="max_amount"
          value="{{ request.args.get('max_amount','') }}"
          placeholder="₹10000"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-emerald-500 outline-none"
        />
      </div>

      <!-- Sort -->
      <div>
        <label class="block text-sm text-slate-400 mb-2"> Sort By </label>

        <select
          name="sort"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-emerald-500 outline-none"
        >
          <option value="latest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="high">Highest Amount</option>
          <option value="low">Lowest Amount</option>
        </select>
      </div>

      <!-- Button -->
      <div class="flex items-end">
        <button
          type="submit"
          class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-semibold py-2.5 rounded-lg transition duration-200"
        >
          Apply Filters
        </button>
      </div>
    </div>
  </form>
</div>
