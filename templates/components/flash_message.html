{%with messages = get_flashed_messages(with_categories=true)%} {% if messages %}
<div class="max-w-7xl mx-auto px-6 mb-6">
  {% for category, message in messages %}
  <div
    class="flash-message px-4 py-3 rounded-lg text-sm font-medium {% if category == 'success' %} bg-emerald-500/20 text-emerald-300 border border-emerald-500 {% elif category == 'danger' %} bg-red-500/20 text-red-300 border border-red-500 {% elif category == 'warning' %} bg-yellow-500/20 text-yellow-300 border border-yellow-500 {% else %} bg-blue-500/20 text-blue-300 border border-blue-500 {% endif %}"
  >
    {{ message }}
  </div>

  {% endfor %}
</div>
{% endif %} {% endwith %}
<script>
  setTimeout(() => {
    document.querySelectorAll(".flash-message").forEach((msg) => {
      msg.style.transition = "opacity 0.5s";
      msg.style.opacity = "0";

      setTimeout(() => {
        msg.remove();
      }, 500);
    });
  }, 3000);
</script>
