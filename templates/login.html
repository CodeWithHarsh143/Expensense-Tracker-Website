{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="flex items-center justify-center min-h-[80vh]">

    <div class="w-full max-w-5xl bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden shadow-2xl grid lg:grid-cols-2">

        <!-- Left Section -->

        <div class="hidden lg:flex flex-col justify-center p-12 bg-gradient-to-br from-emerald-600 to-emerald-800">

            <h1 class="text-5xl font-bold text-white">

                Welcome Back

            </h1>

            <p class="mt-6 text-emerald-100 text-lg">

                Log in to continue tracking your expenses and
                stay on top of your financial goals.

            </p>

        </div>

        <!-- Right Section -->

        <div class="p-10">

            <h2 class="text-3xl font-bold text-white">

                Login

            </h2>

            <p class="text-gray-400 mt-2">

                Enter your credentials to continue.

            </p>

            <form class="mt-8 space-y-5">

                <input
                    type="email"
                    placeholder="Email Address"
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500">

                <input
                    type="password"
                    placeholder="Password"
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500">

                <div class="flex justify-between items-center">

                    <label class="flex items-center gap-2 text-gray-400 text-sm">

                        <input type="checkbox">

                        Remember me

                    </label>

                    <a href="#" class="text-emerald-400 text-sm hover:underline">

                        Forgot Password?

                    </a>

                </div>

                <button
                    class="w-full bg-emerald-500 hover:bg-emerald-400 text-gray-950 font-semibold py-3 rounded-xl transition">

                    Login

                </button>

            </form>

            <p class="text-center text-gray-400 mt-6">

                Don't have an account?

                <a href="/register" class="text-emerald-400 hover:underline">

                    Register

                </a>

            </p>

        </div>

    </div>

</div>

{% endblock %}
